name: gymxai
description: "GymXAI - Yapay Zeka Destekli Spor Salonu Yönetim Sistemi"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  http: ^1.2.1
  cupertino_icons: ^1.0.8
  fl_chart: ^0.69.0
  flutter_local_notifications: ^19.5.0
  shared_preferences: ^2.3.2
  mobile_scanner: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/gymxai_logo.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/gymxai_logo.png"
  min_sdk_android: 21